<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Tab Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Text:wght@400;500;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="clock-card" aria-label="Current date and time">
        <div id="time" class="time">--:--</div>
        <div id="date" class="date">Loading date...</div>
      </section>

      <section class="events-card" aria-label="Upcoming calendar events">
        <header class="events-header">
          <h1>Upcoming Events</h1>
          <div class="actions">
            <button id="signInButton" type="button">Sign in with Google</button>
            <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh events" hidden>
              <span class="material-symbols-rounded" aria-hidden="true">refresh</span>
            </button>
            <button
              id="settingsButton"
              class="icon-button"
              type="button"
              aria-label="Calendar settings"
              aria-expanded="false"
              aria-controls="settingsPanel"
              hidden
            >
              <span class="material-symbols-rounded" aria-hidden="true">settings</span>
            </button>
          </div>
        </header>
        <section id="settingsPanel" class="settings-panel" aria-label="Calendar sync settings" hidden>
          <div class="setting-row">
            <label class="setting-label" for="syncRangeSelect">Sync window</label>
            <select id="syncRangeSelect" class="setting-select" aria-label="Select event sync window">
              <option value="7">Next 7 days</option>
              <option value="14">Next 14 days</option>
              <option value="30">Next 30 days</option>
            </select>
          </div>
          <p class="settings-title">Calendars to sync</p>
          <p id="calendarStatusText" class="calendar-status"></p>
          <div id="calendarsList" class="calendars-list" role="group" aria-label="Selectable calendars"></div>
        </section>
        <p id="statusText" class="status">Sign in to load events.</p>
        <ul id="eventsList" class="events-list" aria-live="polite"></ul>
      </section>
    </main>
    <button id="themeToggleButton" class="theme-toggle" type="button" aria-label="Toggle theme">
      <span id="themeToggleIcon" class="material-symbols-rounded" aria-hidden="true">dark_mode</span>
    </button>

    <script src="config.js"></script>
    <script type="module" src="newtab.js"></script>
  </body>
</html>
